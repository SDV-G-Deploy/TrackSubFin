<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackSubFin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <h1>TrackSubFin</h1>
          <p class="subtitle">Трекинг подписок и ближайших списаний</p>
        </div>
        <button id="openSyncModalBtn" type="button" class="btn-secondary">Синхронизация</button>
      </header>

      <section class="panel sync-panel">
        <div class="panel-title-row">
          <h2>Облако</h2>
          <span id="syncStateBadge" class="sync-badge muted">Не подключено</span>
        </div>
        <p id="syncStatusText" class="sub-meta">Подключите GitHub Gist, чтобы видеть одни и те же данные на разных устройствах.</p>
        <div class="sync-actions">
          <button id="syncNowBtn" class="btn-primary" type="button" disabled>Синхронизировать сейчас</button>
          <button id="disconnectSyncBtn" class="btn-danger" type="button" disabled>Отключить</button>
        </div>
      </section>

      <section class="panel form-panel">
        <h2>Новая подписка</h2>
        <form id="subscriptionForm" class="form-grid">
          <label>
            Название продукта
            <input required name="name" type="text" placeholder="YouTube Premium" />
          </label>

          <label>
            Цена
            <input required name="price" type="number" min="0" step="0.01" placeholder="9.99" />
          </label>

          <label>
            Периодичность
            <select name="frequency" id="frequency" required>
              <option value="monthly">Ежемесячно</option>
              <option value="yearly">Ежегодно</option>
              <option value="custom-days">Каждые N дней</option>
            </select>
          </label>

          <label id="customDaysField" class="hidden">
            Количество дней
            <input name="customDays" type="number" min="1" step="1" placeholder="45" />
          </label>

          <label>
            Следующее списание
            <input required name="nextChargeDate" type="date" />
          </label>

          <label>
            Карта (название)
            <input required name="cardName" type="text" placeholder="Monobank Black" />
          </label>

          <label>
            Последние 4 цифры
            <input
              required
              name="cardLast4"
              type="text"
              inputmode="numeric"
              pattern="\d{4}"
              maxlength="4"
              placeholder="1234"
            />
          </label>

          <label>
            Дата окончания (опционально)
            <input name="endDate" type="date" />
          </label>

          <button type="submit" class="btn-primary">Добавить подписку</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>Ближайшие списания</h2>
          <span id="totalMonthly" class="total-pill">$0.00 / мес</span>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>

      <section class="panel">
        <h2>Список подписок</h2>
        <div id="subscriptionsList" class="subscriptions-list"></div>
      </section>
    </main>

    <div id="syncModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="syncModalTitle">
      <div class="modal-content panel">
        <div class="panel-title-row">
          <h2 id="syncModalTitle">Подключение синхронизации</h2>
          <button id="closeSyncModalBtn" type="button" class="btn-ghost">✕</button>
        </div>

        <form id="syncConnectForm" class="form-grid">
          <label>
            Archive Code
            <input
              id="archiveCodeInput"
              name="archiveCode"
              type="text"
              minlength="6"
              maxlength="24"
              pattern="[A-Za-z0-9-]{6,24}"
              placeholder="my-family-2026"
              required
            />
          </label>

          <label>
            GitHub Token (PAT)
            <div class="token-row">
              <input
                id="githubTokenInput"
                name="githubToken"
                type="password"
                placeholder="ghp_..."
                autocomplete="off"
                required
              />
              <button id="toggleTokenBtn" type="button" class="btn-secondary">Показать</button>
            </div>
            <small class="hint">Нужен PAT со scope <code>gist</code>. Для MVP данные входа хранятся в localStorage этого браузера.</small>
          </label>

          <button id="connectSyncBtn" type="submit" class="btn-primary">Подключить</button>
        </form>

        <p id="syncFormError" class="error-text hidden"></p>
      </div>
    </div>

    <template id="subscriptionCardTemplate">
      <article class="sub-card">
        <div class="sub-main">
          <h3 class="sub-name"></h3>
          <p class="sub-meta"></p>
          <p class="sub-dates"></p>
        </div>
        <div class="sub-side">
          <p class="sub-price"></p>
          <button class="btn-danger" type="button">Удалить</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
